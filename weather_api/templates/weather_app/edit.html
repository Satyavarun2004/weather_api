{% extends 'weather_app/base.html' %}

{% block title %}Edit Weather Log - WeatherLogger{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fa-solid fa-pen-to-square me-2 text-primary"></i>Edit Weather Record</h2>
                <p class="text-white-50">Modify search values manually for log ID #{{ record.id }}</p>
            </div>
            
            <form method="POST" action="{% url 'edit_record' record.id %}">
                {% csrf_token %}
                
                <div class="row g-3 mb-4">
                    <!-- City Name -->
                    <div class="col-md-6">
                        <label for="city" class="form-label text-white-50">City Name</label>
                        <input type="text" name="city" id="city" class="form-control form-control-custom" value="{{ record.city }}" required>
                    </div>
                    
                    <!-- Country Name -->
                    <div class="col-md-6">
                        <label for="country" class="form-label text-white-50">Country</label>
                        <input type="text" name="country" id="country" class="form-control form-control-custom" value="{{ record.country }}" required>
                    </div>

                    <!-- Temperature -->
                    <div class="col-md-4">
                        <label for="temperature" class="form-label text-white-50">Temperature (°C)</label>
                        <input type="number" step="0.01" name="temperature" id="temperature" class="form-control form-control-custom" value="{{ record.temperature }}" required>
                    </div>
                    
                    <!-- Humidity -->
                    <div class="col-md-4">
                        <label for="humidity" class="form-label text-white-50">Humidity (%)</label>
                        <input type="number" name="humidity" id="humidity" class="form-control form-control-custom" value="{{ record.humidity }}" required>
                    </div>
                    
                    <!-- Wind Speed -->
                    <div class="col-md-4">
                        <label for="wind_speed" class="form-label text-white-50">Wind Speed (km/h)</label>
                        <input type="number" step="0.01" name="wind_speed" id="wind_speed" class="form-control form-control-custom" value="{{ record.wind_speed }}" required>
                    </div>

                    <!-- Condition -->
                    <div class="col-md-6">
                        <label for="condition" class="form-label text-white-50">Weather Condition</label>
                        <input type="text" name="condition" id="condition" class="form-control form-control-custom" value="{{ record.condition }}" required>
                    </div>
                    
                    <!-- Feels Like -->
                    <div class="col-md-6">
                        <label for="feels_like" class="form-label text-white-50">Feels Like (°C)</label>
                        <input type="number" step="0.01" name="feels_like" id="feels_like" class="form-control form-control-custom" value="{{ record.feels_like }}">
                    </div>

                    <!-- Pressure -->
                    <div class="col-md-4">
                        <label for="pressure" class="form-label text-white-50">Pressure (mb)</label>
                        <input type="number" step="0.01" name="pressure" id="pressure" class="form-control form-control-custom" value="{{ record.pressure }}">
                    </div>
                    
                    <!-- Visibility -->
                    <div class="col-md-4">
                        <label for="visibility" class="form-label text-white-50">Visibility (km)</label>
                        <input type="number" step="0.01" name="visibility" id="visibility" class="form-control form-control-custom" value="{{ record.visibility }}">
                    </div>
                    
                    <!-- UV Index -->
                    <div class="col-md-4">
                        <label for="uv_index" class="form-label text-white-50">UV Index</label>
                        <input type="number" step="0.1" name="uv_index" id="uv_index" class="form-control form-control-custom" value="{{ record.uv_index }}">
                    </div>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <button type="submit" class="btn btn-custom px-4">
                        <i class="fa-solid fa-floppy-disk me-1"></i>Save Changes
                    </button>
                    <a href="{% url 'history' %}" class="btn btn-secondary-custom px-4 text-decoration-none">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
